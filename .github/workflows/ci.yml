name: CI

on:
  push:
  pull_request:

jobs:
  cmake-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install OpenGL build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build

